<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الزبدة</title>

<style>
/* نفس CSS حقك بدون تغيير */
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: radial-gradient(circle at top, #0b0d14, #05060a);
  color: white;
  min-height: 100vh;
}
.nav { display:flex; justify-content:space-between; padding:20px; }
.logo { color:#8b5cf6; font-weight:bold; }
.hero { text-align:center; margin-top:80px; }
input {
  padding:15px; border-radius:10px; border:none;
  background:#141622; color:white; width:300px;
}
button {
  padding:15px 20px; border:none; border-radius:10px;
  background:#8b5cf6; color:white; cursor:pointer;
}
.result { display:none; margin-top:40px; }
.loader {
  border:4px solid #1f1f1f;
  border-top:4px solid #8b5cf6;
  border-radius:50%;
  width:30px; height:30px;
  animation:spin 1s linear infinite;
}
@keyframes spin {
  0%{transform:rotate(0)}
  100%{transform:rotate(360deg)}
}
</style>
</head>

<body>

<div class="nav">
  <div class="logo">الزبدة</div>
</div>

<div class="hero">
  <h1>لخص أي فيديو يوتيوب</h1>

  <input id="url" placeholder="رابط يوتيوب">
  <button onclick="summarize()">زبدة الفيديو</button>

  <div id="loading" style="display:none;">
    <div class="loader"></div>
    <p>جاري التلخيص...</p>
  </div>
</div>

<div class="result" id="result">
  <h2 id="title"></h2>
  <p id="meta"></p>
  <img id="thumb" width="300">
  <pre id="summary"></pre>
</div>

<script>
async function summarize(){
  const url = document.getElementById("url").value;

  if(!url){
    alert("حط الرابط أول ❌");
    return;
  }

  document.getElementById("loading").style.display = "block";
  result.style.display="none";

  try {
    const res = await fetch("https://alzobda-production-c29b.up.railway.app/summarize",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({ url })
    });

    const data = await res.json();

    // 🔥 مهم: عرض الأخطاء
    if (data.error) {
      document.getElementById("loading").style.display = "none";
      alert(data.error);
      return;
    }

    if (!data.summary) {
      document.getElementById("loading").style.display = "none";
      alert("ما فيه بيانات ❌");
      return;
    }

    title.innerText = data.title || "";
    meta.innerText = data.channel || "";
    thumb.src = data.thumbnail || "";
    summary.innerText = data.summary;

    document.getElementById("loading").style.display = "none";
    result.style.display="block";

  } catch (err) {
    console.log(err);
    document.getElementById("loading").style.display = "none";
    alert("خطأ في الاتصال ❌");
  }
}
</script>

</body>
</html>
